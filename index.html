<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="单词记忆">
    <link rel="manifest" href="./manifest.json">
    <title>考研单词记忆</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #f5f3ef;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            color: #2c2c2c;
        }

        /* 顶部导航栏 */
        .header {
            width: 100%;
            max-width: 1000px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding: 15px 25px;
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.06);
            border: 1px solid #e8e5e0;
        }

        .header h1 {
            font-size: 1.4rem;
            color: #1a1a1a;
            font-weight: 700;
        }

        .header-controls {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .chapter-select {
            padding: 10px 20px;
            font-size: 1rem;
            border: 1px solid #d5d0c8;
            border-radius: 8px;
            background: white;
            cursor: pointer;
            font-weight: 600;
            color: #2c2c2c;
            transition: all 0.2s;
        }

        .chapter-select:hover {
            border-color: #8a8578;
        }

        .chapter-select:focus {
            outline: none;
            border-color: #6b6560;
            box-shadow: 0 0 0 2px rgba(107,101,96,0.15);
        }

        .reset-btn {
            padding: 10px 20px;
            background: #8b4d4d;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .reset-btn:hover {
            background: #7a4242;
        }

        /* 工具栏 */
        .toolbar {
            width: 100%;
            max-width: 1000px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding: 12px 20px;
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.06);
            border: 1px solid #e8e5e0;
            gap: 12px;
            flex-wrap: wrap;
        }

        .toolbar-left {
            display: flex;
            align-items: center;
            gap: 10px;
            flex: 1;
            min-width: 200px;
        }

        .toolbar-right {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .search-box {
            position: relative;
            flex: 1;
            max-width: 300px;
        }

        .search-input {
            width: 100%;
            padding: 10px 15px 10px 38px;
            border: 1px solid #d5d0c8;
            border-radius: 8px;
            font-size: 0.95rem;
            background: #faf9f7;
            transition: all 0.2s;
            color: #2c2c2c;
        }

        .search-input:focus {
            outline: none;
            border-color: #6b6560;
            box-shadow: 0 0 0 2px rgba(107,101,96,0.15);
            background: white;
        }

        .search-icon {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: #9a9590;
            font-size: 1rem;
        }

        .toolbar-btn {
            padding: 10px 16px;
            border: 1px solid #d5d0c8;
            border-radius: 8px;
            background: white;
            color: #4a4540;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .toolbar-btn:hover {
            border-color: #8a8578;
            color: #2c2c2c;
            background: #faf9f7;
        }

        .toolbar-btn.active {
            background: #4a4540;
            color: white;
            border-color: transparent;
        }

        .toolbar-btn .badge {
            background: #8b4d4d;
            color: white;
            font-size: 0.75rem;
            padding: 2px 6px;
            border-radius: 10px;
            min-width: 18px;
            text-align: center;
        }

        .toolbar-btn.active .badge {
            background: rgba(255,255,255,0.3);
        }

        /* 拼写测试模式 */
        .spelling-mode {
            display: none;
            width: 100%;
            max-width: 1000px;
            margin-bottom: 25px;
        }

        .spelling-mode.active {
            display: block;
        }

        .spelling-card {
            background: #ffffff;
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.06);
            border: 1px solid #e8e5e0;
            text-align: center;
        }

        .spelling-hint {
            font-size: 1.8rem;
            font-weight: 700;
            color: #1a1a1a;
            margin-bottom: 30px;
        }

        .spelling-input {
            width: 100%;
            max-width: 400px;
            padding: 15px 20px;
            border: 2px solid #d5d0c8;
            border-radius: 10px;
            font-size: 1.5rem;
            text-align: center;
            letter-spacing: 2px;
            transition: all 0.3s;
            margin-bottom: 20px;
            color: #2c2c2c;
        }

        .spelling-input:focus {
            outline: none;
            border-color: #6b6560;
            box-shadow: 0 0 0 3px rgba(107,101,96,0.15);
        }

        .spelling-input.correct {
            border-color: #5a7a5a;
            box-shadow: 0 0 0 3px rgba(90,122,90,0.15);
        }

        .spelling-input.wrong {
            border-color: #8b4d4d;
            box-shadow: 0 0 0 3px rgba(139,77,77,0.15);
        }

        .spelling-feedback {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 15px;
            min-height: 30px;
        }

        .spelling-feedback.correct {
            color: #5a7a5a;
        }

        .spelling-feedback.wrong {
            color: #8b4d4d;
        }

        .spelling-answer {
            font-size: 1.3rem;
            color: #6b6560;
            margin-bottom: 20px;
        }

        .spelling-actions {
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        .spelling-btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .spelling-btn.primary {
            background: #4a4540;
            color: white;
        }

        .spelling-btn.primary:hover {
            background: #3a3530;
        }

        .spelling-btn.secondary {
            background: #e8e5e0;
            color: #4a4540;
        }

        .spelling-btn.secondary:hover {
            background: #d5d0c8;
        }

        /* 艾宾浩斯复习模式 */
        .ebbinghaus-mode {
            display: none;
            width: 100%;
            max-width: 1000px;
            margin-bottom: 25px;
        }

        .ebbinghaus-mode.active {
            display: block;
        }

        .ebbinghaus-card {
            background: #ffffff;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.06);
            border: 1px solid #e8e5e0;
        }

        .ebbinghaus-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .ebbinghaus-title {
            font-size: 1.3rem;
            font-weight: 700;
            color: #1a1a1a;
        }

        .ebbinghaus-stats {
            display: flex;
            gap: 15px;
        }

        .ebbinghaus-stat {
            padding: 8px 14px;
            background: #faf9f7;
            border-radius: 8px;
            font-size: 0.9rem;
            color: #4a4540;
            border: 1px solid #e8e5e0;
        }

        .ebbinghaus-stat span {
            font-weight: 700;
            color: #4a4540;
        }

        .ebbinghaus-list {
            max-height: 300px;
            overflow-y: auto;
        }

        .ebbinghaus-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 15px;
            border-bottom: 1px solid #f0ede8;
            transition: background 0.2s;
        }

        .ebbinghaus-item:hover {
            background: #faf9f7;
        }

        .ebbinghaus-word {
            font-weight: 600;
            color: #2c2c2c;
        }

        .ebbinghaus-meaning {
            color: #6b6560;
            margin-left: 15px;
        }

        .ebbinghaus-time {
            font-size: 0.85rem;
            color: #8a8578;
            padding: 4px 8px;
            background: #f0ede8;
            border-radius: 6px;
        }

        .ebbinghaus-time.urgent {
            background: #f0dede;
            color: #8b4d4d;
        }

        .ebbinghaus-time.soon {
            background: #f0ead6;
            color: #7a6b3a;
        }

        .ebbinghaus-actions {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 20px;
        }

        .ebbinghaus-empty {
            text-align: center;
            padding: 40px;
            color: #9a9590;
        }

        /* 熟练度筛选 */
        .filter-bar {
            width: 100%;
            max-width: 1000px;
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 8px 16px;
            border: 1px solid #d5d0c8;
            border-radius: 20px;
            background: #ffffff;
            color: #4a4540;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .filter-btn:hover {
            background: #faf9f7;
            border-color: #8a8578;
        }

        .filter-btn.active {
            background: #4a4540;
            color: white;
            border-color: transparent;
        }

        .filter-btn .filter-count {
            display: inline-block;
            min-width: 20px;
            padding: 2px 6px;
            background: rgba(0,0,0,0.08);
            border-radius: 10px;
            margin-left: 6px;
            font-size: 0.8rem;
        }

        .filter-btn.active .filter-count {
            background: rgba(255,255,255,0.25);
        }

        /* 统计面板 */
        .stats-panel {
            width: 100%;
            max-width: 1000px;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: #ffffff;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 1px 4px rgba(0,0,0,0.06);
            border: 1px solid #e8e5e0;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 800;
            color: #2c2c2c;
        }

        .stat-label {
            font-size: 0.85rem;
            color: #8a8578;
            margin-top: 5px;
            font-weight: 500;
        }

        /* 进度条 */
        .progress-container {
            width: 100%;
            max-width: 1000px;
            margin-bottom: 25px;
        }

        .progress-bar {
            height: 8px;
            background: #e8e5e0;
            border-radius: 8px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: #6b6560;
            border-radius: 8px;
            transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .progress-text {
            text-align: center;
            color: #6b6560;
            font-size: 0.9rem;
            margin-top: 8px;
            font-weight: 500;
        }

        /* 卡片容器 */
        .card-container {
            width: 100%;
            max-width: 1000px;
            perspective: 1500px;
            margin-bottom: 25px;
        }

        .card {
            width: 100%;
            height: 400px;
            position: relative;
            cursor: pointer;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
        }

        .card.flipped {
            transform: rotateY(180deg);
        }

        .card.no-transition {
            transition: none !important;
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            border: 1px solid #e8e5e0;
        }

        .card-front {
            background: #ffffff;
        }

        .card-back {
            background: #3a3530;
            transform: rotateY(180deg);
        }

        .word-display {
            font-size: 4.5rem;
            font-weight: 800;
            color: #1a1a1a;
            text-align: center;
            margin-bottom: 15px;
            line-height: 1.2;
        }

        .mastery-indicator {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
        }

        .mastery-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #e8e5e0;
            transition: all 0.3s;
        }

        .mastery-dot.filled {
            background: #5a7a5a;
        }

        .hint-text {
            color: #9a9590;
            font-size: 1rem;
            font-weight: 500;
        }

        .definition-display {
            font-size: 2.5rem;
            font-weight: 700;
            color: #f5f3ef;
            text-align: center;
            line-height: 1.4;
        }

        .review-badge {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255,255,255,0.15);
            color: #f5f3ef;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        /* 操作按钮 */
        .action-buttons {
            width: 100%;
            max-width: 1000px;
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 25px;
        }

        .action-btn {
            flex: 1;
            max-width: 200px;
            padding: 18px 30px;
            border: none;
            border-radius: 12px;
            font-size: 1.2rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .know-btn {
            background: #5a7a5a;
            color: white;
        }

        .know-btn:hover {
            background: #4d6b4d;
        }

        .dont-know-btn {
            background: #8b4d4d;
            color: white;
        }

        .dont-know-btn:hover {
            background: #7a4242;
        }

        /* 快捷键提示 */
        .shortcuts-hint {
            background: #ffffff;
            border-radius: 12px;
            padding: 15px 25px;
            display: flex;
            gap: 30px;
            border: 1px solid #e8e5e0;
        }

        .shortcut-item {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #6b6560;
            font-size: 0.9rem;
        }

        .key {
            background: #f0ede8;
            padding: 4px 10px;
            border-radius: 6px;
            font-weight: 600;
            font-size: 0.8rem;
            color: #4a4540;
            border: 1px solid #d5d0c8;
        }

        /* 完成界面 */
        .finished-screen {
            display: none;
            width: 100%;
            max-width: 600px;
            background: #ffffff;
            border-radius: 16px;
            padding: 60px 40px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            border: 1px solid #e8e5e0;
        }

        .finished-screen.show {
            display: block;
        }

        .finished-icon {
            font-size: 5rem;
            margin-bottom: 20px;
        }

        .finished-title {
            font-size: 2.5rem;
            color: #1a1a1a;
            font-weight: 800;
            margin-bottom: 15px;
        }

        .finished-subtitle {
            font-size: 1.2rem;
            color: #6b6560;
            margin-bottom: 30px;
        }

        .finished-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }

        .finished-stat {
            background: #faf9f7;
            border-radius: 12px;
            padding: 20px;
            border: 1px solid #e8e5e0;
        }

        .finished-stat-value {
            font-size: 2rem;
            font-weight: 800;
            color: #2c2c2c;
        }

        .finished-stat-label {
            font-size: 0.85rem;
            color: #8a8578;
            margin-top: 5px;
        }

        .restart-btn {
            padding: 15px 40px;
            background: #4a4540;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .restart-btn:hover {
            background: #3a3530;
        }

        /* ========== 每日进度追踪日志 ========== */
        .daily-log-panel {
            width: 100%;
            max-width: 1000px;
            margin-bottom: 20px;
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.06);
            border: 1px solid #e8e5e0;
            overflow: hidden;
        }

        .daily-log-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 20px;
            background: #faf9f7;
            border-bottom: 1px solid #e8e5e0;
            cursor: pointer;
            user-select: none;
        }

        .daily-log-header:hover {
            background: #f5f3ef;
        }

        .daily-log-title {
            font-size: 1rem;
            font-weight: 700;
            color: #2c2c2c;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .daily-log-toggle {
            font-size: 0.85rem;
            color: #8a8578;
            transition: transform 0.2s;
        }

        .daily-log-toggle.open {
            transform: rotate(180deg);
        }

        .daily-log-content {
            display: none;
            padding: 20px;
        }

        .daily-log-content.show {
            display: block;
        }

        .log-date-nav {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-bottom: 20px;
        }

        .log-date-btn {
            padding: 6px 12px;
            border: 1px solid #d5d0c8;
            border-radius: 6px;
            background: white;
            color: #4a4540;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .log-date-btn:hover {
            background: #faf9f7;
            border-color: #8a8578;
        }

        .log-date-display {
            font-size: 1.1rem;
            font-weight: 700;
            color: #2c2c2c;
            min-width: 150px;
            text-align: center;
        }

        .log-entries {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .log-entry {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            background: #faf9f7;
            border-radius: 8px;
            border: 1px solid #e8e5e0;
        }

        .log-entry-checkbox {
            width: 22px;
            height: 22px;
            border: 2px solid #d5d0c8;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .log-entry-checkbox:hover {
            border-color: #8a8578;
        }

        .log-entry-checkbox.checked {
            background: #5a7a5a;
            border-color: #5a7a5a;
            color: white;
        }

        .log-entry-checkbox.exceeded {
            background: #4a6a8a;
            border-color: #4a6a8a;
            color: white;
        }

        .log-entry-checkbox.incomplete {
            background: #8b4d4d;
            border-color: #8b4d4d;
            color: white;
        }

        .log-entry-text {
            flex: 1;
            font-size: 0.95rem;
            color: #2c2c2c;
        }

        .log-entry-status {
            font-size: 0.8rem;
            padding: 3px 8px;
            border-radius: 4px;
            font-weight: 600;
        }

        .log-entry-status.done {
            background: #e8f0e8;
            color: #5a7a5a;
        }

        .log-entry-status.exceeded {
            background: #e0eaf0;
            color: #4a6a8a;
        }

        .log-entry-status.missed {
            background: #f0e0e0;
            color: #8b4d4d;
        }

        .log-entry-status.pending {
            background: #f0ede8;
            color: #8a8578;
        }

        .log-summary {
            margin-top: 20px;
            padding: 15px;
            background: #faf9f7;
            border-radius: 8px;
            border: 1px solid #e8e5e0;
            text-align: center;
        }

        .log-summary-text {
            font-size: 0.95rem;
            color: #6b6560;
        }

        .log-summary-text strong {
            color: #2c2c2c;
        }

        .log-add-btn {
            margin-top: 15px;
            padding: 10px 20px;
            border: 1px dashed #d5d0c8;
            border-radius: 8px;
            background: transparent;
            color: #8a8578;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s;
            width: 100%;
        }

        .log-add-btn:hover {
            border-color: #8a8578;
            color: #4a4540;
            background: #faf9f7;
        }

        /* 启动提醒弹窗 */
        .reminder-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;

<script>
// ========== API 桥接层 ==========
// 动态检测 PyWebView API（因为 API 是页面加载后才注入的）
function getApi() {
    return window.pywebview?.api;
}

function isPyWebView() {
    return !!getApi();
}

// 等待 PyWebView API 就绪（最多等待 timeout 毫秒）
async function waitForApi(timeout = 3000) {
    const start = Date.now();
    while (!isPyWebView() && Date.now() - start < timeout) {
        await new Promise(r => setTimeout(r, 100));
    }
    return isPyWebView();
}

// API 调用封装
const API = {
    // 生词本
    async getWordbook() {
        if (isPyWebView()) {
            const result = await getApi().get_wordbook();
            return result;
        }
        return JSON.parse(localStorage.getItem('wordMemory_wordbook') || '[]');
    },

    async saveWordbook(wordbookData) {
        if (isPyWebView()) {
            // PyWebView 环境下保存整个生词本
            await getApi().save_wordbook_json(JSON.stringify(wordbookData));
            return;
        }
        localStorage.setItem('wordMemory_wordbook', JSON.stringify(wordbookData));
    },

    async addToWordbook(word) {
        if (isPyWebView()) {
            return await getApi().add_to_wordbook(JSON.stringify(word));
        }
        const wordbook = JSON.parse(localStorage.getItem('wordMemory_wordbook') || '[]');
        if (!wordbook.find(w => w.en === word.en)) {
            wordbook.push({...word, addedAt: Date.now()});
            localStorage.setItem('wordMemory_wordbook', JSON.stringify(wordbook));
        }
        return JSON.stringify({success: true, count: wordbook.length});
    },

    async removeFromWordbook(wordEn) {
        if (isPyWebView()) {
            return await getApi().remove_from_wordbook(wordEn);
        }
        let wordbook = JSON.parse(localStorage.getItem('wordMemory_wordbook') || '[]');
        wordbook = wordbook.filter(w => w.en !== wordEn);
        localStorage.setItem('wordMemory_wordbook', JSON.stringify(wordbook));
        return JSON.stringify({success: true, count: wordbook.length});
    },

    // 错题本
    async getMistakes() {
        if (isPyWebView()) {
            return await getApi().get_mistakes();
        }
        return JSON.parse(localStorage.getItem('wordMemory_mistakes') || '[]');
    },

    async saveMistakes(mistakesData) {
        if (isPyWebView()) {
            await getApi().save_mistakes_json(JSON.stringify(mistakesData));
            return;
        }
        localStorage.setItem('wordMemory_mistakes', JSON.stringify(mistakesData));
    },

    async addToMistakes(word) {
        if (isPyWebView()) {
            return await getApi().add_to_mistakes(JSON.stringify(word));
        }
        const mistakes = JSON.parse(localStorage.getItem('wordMemory_mistakes') || '[]');
        const existing = mistakes.find(w => w.en === word.en);
        if (existing) {
            existing.count = (existing.count || 1) + 1;
            existing.lastWrongAt = Date.now();
        } else {
            mistakes.push({...word, count: 1, lastWrongAt: Date.now()});
        }
        localStorage.setItem('wordMemory_mistakes', JSON.stringify(mistakes));
        return JSON.stringify({success: true, count: mistakes.length});
    },

    async removeFromMistakes(wordEn) {
        if (isPyWebView()) {
            return await getApi().remove_from_mistakes(wordEn);
        }
        let mistakes = JSON.parse(localStorage.getItem('wordMemory_mistakes') || '[]');
        mistakes = mistakes.filter(w => w.en !== wordEn);
        localStorage.setItem('wordMemory_mistakes', JSON.stringify(mistakes));
        return JSON.stringify({success: true, count: mistakes.length});
    },

    // 学习进度
    async getProgress(chapter) {
        if (isPyWebView()) {
            return await getApi().get_progress(chapter);
        }
        const key = `wordMemory_progress_${chapter}`;
        return JSON.parse(localStorage.getItem(key) || '{}');
    },

    async saveProgress(chapter, data) {
        if (isPyWebView()) {
            return await getApi().save_progress(chapter, JSON.stringify(data));
        }
        const key = `wordMemory_progress_${chapter}`;
        localStorage.setItem(key, JSON.stringify(data));
        return JSON.stringify({success: true});
    },

    // 艾宾浩斯
    async getEbbinghaus() {
        if (isPyWebView()) {
            return await getApi().get_ebbinghaus();
        }
        return JSON.parse(localStorage.getItem('wordMemory_ebbinghaus') || '{}');
    },

    async updateEbbinghaus(wordEn, isCorrect) {
        if (isPyWebView()) {
            return await getApi().update_ebbinghaus(wordEn, isCorrect);
        }
        const data = JSON.parse(localStorage.getItem('wordMemory_ebbinghaus') || '{}');
        const now = Date.now();
        const intervals = [
            20 * 60 * 1000,
            1 * 60 * 60 * 1000,
            9 * 60 * 60 * 1000,
            1 * 24 * 60 * 60 * 1000,
            2 * 24 * 60 * 60 * 1000,
            6 * 24 * 60 * 60 * 1000,
            31 * 24 * 60 * 60 * 1000
        ];

        if (!data[wordEn]) {
            data[wordEn] = {stage: 0, nextReview: now + intervals[0], lastReview: now};
        }
        const record = data[wordEn];
        record.stage = isCorrect ? Math.min(record.stage + 1, intervals.length - 1) : 0;
        record.nextReview = now + intervals[record.stage];
        record.lastReview = now;
        data[wordEn] = record;
        localStorage.setItem('wordMemory_ebbinghaus', JSON.stringify(data));
        return JSON.stringify({success: true, record});
    },

    // 导出导入
    async exportData() {
        if (isPyWebView()) {
            return await getApi().export_all_data();
        }
        return JSON.stringify({
            version: '1.0',
            exportDate: Date.now(),
            wordbook: JSON.parse(localStorage.getItem('wordMemory_wordbook') || '[]'),
            mistakes: JSON.parse(localStorage.getItem('wordMemory_mistakes') || '[]'),
            ebbinghaus: JSON.parse(localStorage.getItem('wordMemory_ebbinghaus') || '{}')
        });
    },

    async importData(dataJson) {
        if (isPyWebView()) {
            return await getApi().import_data(dataJson);
        }
        try {
            const data = JSON.parse(dataJson);
            if (data.wordbook) localStorage.setItem('wordMemory_wordbook', JSON.stringify(data.wordbook));
            if (data.mistakes) localStorage.setItem('wordMemory_mistakes', JSON.stringify(data.mistakes));
            if (data.ebbinghaus) localStorage.setItem('wordMemory_ebbinghaus', JSON.stringify(data.ebbinghaus));
            return JSON.stringify({success: true, message: '导入成功'});
        } catch(e) {
            return JSON.stringify({success: false, message: '导入失败: ' + e.message});
        }
    }
};

// 洗牌函数
function shuffle(arr) {
    const result = [...arr];
    for (let i = result.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [result[i], result[j]] = [result[j], result[i]];
    }
    return result;
}

// 生成学习队列（间隔复习机制）
function generateStudyQueue(words) {
    // 根据熟练度决定出现次数
    // 新词或不熟悉的词出现更多次
    const wordRounds = {};
    let maxRounds = 0;

    words.forEach(word => {
        const mastery = wordStats[word.en]?.mastery || 0;
        // 熟练度0: 出现3次, 熟练度1: 出现2次, 熟练度2+: 出现1次
        const repeatCount = Math.max(1, 3 - mastery);
        wordRounds[word.en] = repeatCount;
        maxRounds = Math.max(maxRounds, repeatCount);
    });

    // 每轮独立 shuffle：每轮包含所有需要该轮次的词的一个副本
    const rounds = [];
    for (let r = 0; r < maxRounds; r++) {
        const round = [];
        words.forEach(word => {
            if (wordRounds[word.en] > r) {
                round.push({...word, isReview: r > 0});
            }
        });
        rounds.push(shuffle(round));
    }

    // 交错拼接各轮，确保同一词的副本间隔足够远
    // 并处理轮次边界处同一词连续出现的问题
    const queue = [];
    for (let r = 0; r < rounds.length; r++) {
        const round = rounds[r];
        if (r > 0 && queue.length > 0 && round.length > 1) {
            // 检查上一轮结尾和本轮开头的词是否相同
            const tailWord = queue[queue.length - 1].en;
            if (round[0].en === tailWord) {
                // 把冲突的词从开头移到随机位置
                const item = round.shift();
                round.splice(1 + Math.floor(Math.random() * round.length), 0, item);
            }
        }
        queue.push(...round);
    }

    return queue;
}

    const saved = await loadProgress();

        currentIndex = saved.index;
        wordStats = saved.stats;
        sessionStats = saved.session;
    } else {
        studyQueue = generateStudyQueue(words);
        currentIndex = 0;
        wordStats = {};
        sessionStats = { correct: 0, total: 0, reviewCount: 0 };
    }

    finishedScreen.classList.remove('show');
    cardContainer.style.display = 'block';
    actionButtons.style.display = 'flex';

    showCurrentCard();
    updateStats();
    await saveProgress();
}

// 显示当前卡片
function showCurrentCard() {
    if (currentIndex >= studyQueue.length) {
        showFinished();
        return;
    }

    const item = studyQueue[currentIndex];
    wordDisplay.textContent = item.en;
    definitionDisplay.textContent = item.zh;

    // 更新熟练度指示器
    const mastery = wordStats[item.en]?.mastery || 0;
    const dots = masteryIndicator.querySelectorAll('.mastery-dot');
    dots.forEach((dot, i) => {
        dot.classList.toggle('filled', i < Math.min(mastery, 3));
    });

    // 更新复习标记
    if (item.isReview) {
        reviewBadge.textContent = '复习';
        reviewBadge.style.display = 'block';
    } else {
        reviewBadge.textContent = '新词';
        reviewBadge.style.display = 'block';
    }

    // 重置卡片状态：先禁用动画，瞬间切回正面，再恢复动画
    // 防止从释义面翻页时，新单词的释义在翻转动画中短暂可见
    card.classList.add('no-transition');
    card.classList.remove('flipped');
    void card.offsetWidth; // 强制浏览器重绘，确保 no-transition 生效
    card.classList.remove('no-transition');

    // 更新进度
    const progress = ((currentIndex + 1) / studyQueue.length) * 100;
    progressFill.style.width = progress + '%';
    progressText.textContent = `${currentIndex + 1} / ${studyQueue.length}`;
}

// 标记为认识
function markAsKnown() {
    if (currentIndex >= studyQueue.length) return;

    const item = studyQueue[currentIndex];
    const key = item.en;

    // 更新熟练度
    if (!wordStats[key]) {
        wordStats[key] = { mastery: 0, correctCount: 0, wrongCount: 0 };
    }

    wordStats[key].mastery = Math.min(3, wordStats[key].mastery + 1);
    wordStats[key].correctCount++;

    sessionStats.correct++;
    sessionStats.total++;

    if (item.isReview) {
        sessionStats.reviewCount++;
    }

    currentIndex++;
    showCurrentCard();
    updateStats();
    saveProgress();
}

// 标记为不认识
function markAsUnknown() {
    if (currentIndex >= studyQueue.length) return;

    const item = studyQueue[currentIndex];
    const key = item.en;

    // 更新熟练度
    if (!wordStats[key]) {
        wordStats[key] = { mastery: 0, correctCount: 0, wrongCount: 0 };
    }

    wordStats[key].mastery = Math.max(0, wordStats[key].mastery - 1);
    wordStats[key].wrongCount++;

    sessionStats.total++;

    if (item.isReview) {
        sessionStats.reviewCount++;
    }

    // 将不认识的词添加到队列后面（间隔复习）
    // currentIndex++ 后会跳到下一张，所以插入位置至少要在 currentIndex+2 之后
    // 用 Math.max 确保至少有 2 张以上间隔，避免同一个词立刻再次出现
    const minGap = Math.min(3, studyQueue.length - currentIndex - 1);
    const maxGap = Math.min(8, studyQueue.length - currentIndex - 1);
    const insertPos = currentIndex + 1 + minGap + Math.floor(Math.random() * Math.max(1, maxGap - minGap + 1));
    studyQueue.splice(insertPos, 0, {...item, isReview: true});

    currentIndex++;
    showCurrentCard();
    updateStats();
    saveProgress();
}

// 更新统计面板
function updateStats() {
    const words = allLessons[currentChapter] || [];
    const totalWords = words.length;

    let learned = 0;
    let learning = 0;

    words.forEach(w => {
        const stat = wordStats[w.en];
        if (stat) {
            if (stat.mastery >= 3) {
                learned++;
            } else {
                learning++;
            }
        }
    });

    document.getElementById('totalCount').textContent = totalWords;
    document.getElementById('learnedCount').textContent = learned;
    document.getElementById('learningCount').textContent = learning;

    const accuracy = sessionStats.total > 0
        ? Math.round((sessionStats.correct / sessionStats.total) * 100)
        : 0;
    document.getElementById('accuracy').textContent = accuracy + '%';
}

function searchWords(query) {
    const results = [];
    for (const chapter in allLessons) {
        allLessons[chapter].forEach(word => {
            if (word.en.toLowerCase().includes(query) || word.zh.includes(query)) {
                results.push({...word, chapter: parseInt(chapter)});

        });
    }
    renderSearchResults(results, query);
}

// ========== 导出导入功能 ==========
async function exportData() {
    const data = await API.exportData();
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `考研单词_${new Date().toLocaleDateString()}.json`;
    a.click();
    URL.revokeObjectURL(url);
}

function importData() {
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = '.json';
    input.onchange = async (e) => {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = async (event) => {
            try {
                const data = JSON.parse(event.target.result);
                const result = await API.importData(data);

                if (result.success) {
                    // 重新加载数据
                    wordbook = await API.getWordbook();
                    mistakes = await API.getMistakes();
                    updateWordbookCount();
                    updateMistakesCount();
                    alert('导入成功！');
                    await initChapter();
                } else {
                    alert('导入失败：' + result.message);
                }
            } catch(err) {
                alert('导入失败：文件格式不正确');
                console.error('导入错误:', err);
            }
        };
        reader.readAsText(file);
    };
    input.click();
}

function toggleSpellingMode() {

    spellingQueue = shuffle([...words]);

function exitSpellingMode() {

    document.getElementById('spellingMode').classList.remove('active');

    // 恢复普通卡片模式
    cardContainer.style.display = 'block';

function showSpellingCard() {
    if (spellingIndex >= spellingQueue.length) {
        showSpellingFinished();
        return;
    }

    const item = spellingQueue[spellingIndex];
    document.getElementById('spellingHint').textContent = item.zh;
    document.getElementById('spellingInput').value = '';
    document.getElementById('spellingInput').className = 'spelling-input';
    document.getElementById('spellingFeedback').textContent = '';
    document.getElementById('spellingFeedback').className = 'spelling-feedback';
    document.getElementById('spellingAnswer').textContent = '';
    document.getElementById('spellingSubmit').style.display = 'inline-block';
    document.getElementById('spellingSkip').style.display = 'inline-block';

    // 自动聚焦输入框
    setTimeout(() => {
        document.getElementById('spellingInput').focus();
    }, 100);
}

function checkSpelling() {
    const input = document.getElementById('spellingInput').value.trim().toLowerCase();
    const item = spellingQueue[spellingIndex];
    const correct = item.en.toLowerCase();

    spellingStats.total++;

    const inputEl = document.getElementById('spellingInput');
    const feedbackEl = document.getElementById('spellingFeedback');
    const answerEl = document.getElementById('spellingAnswer');

    if (input === correct) {
        // 正确
        spellingStats.correct++;
        inputEl.className = 'spelling-input correct';
        feedbackEl.textContent = '正确！';
        feedbackEl.className = 'spelling-feedback correct';

        // 更新熟练度
        if (!wordStats[item.en]) {
            wordStats[item.en] = { mastery: 0, correctCount: 0, wrongCount: 0 };
        }
        wordStats[item.en].mastery = Math.min(3, wordStats[item.en].mastery + 1);
        wordStats[item.en].correctCount++;
    } else {
        // 错误
        inputEl.className = 'spelling-input wrong';
        feedbackEl.textContent = '错误！';
        feedbackEl.className = 'spelling-feedback wrong';
        answerEl.textContent = `正确答案: ${item.en}`;

        // 更新熟练度
        if (!wordStats[item.en]) {
            wordStats[item.en] = { mastery: 0, correctCount: 0, wrongCount: 0 };
        }
        wordStats[item.en].mastery = Math.max(0, wordStats[item.en].mastery - 1);
        wordStats[item.en].wrongCount++;

        // 添加到错题本
        addToMistakes(item);
    }

    // 隐藏提交和跳过按钮，显示下一题
    document.getElementById('spellingSubmit').style.display = 'none';
    document.getElementById('spellingSkip').style.display = 'none';

    setTimeout(() => {
        spellingIndex++;
        showSpellingCard();
    }, 1500);
}

function skipSpelling() {
    const item = spellingQueue[spellingIndex];
    const feedbackEl = document.getElementById('spellingFeedback');
    const answerEl = document.getElementById('spellingAnswer');

    feedbackEl.textContent = '已跳过';
    feedbackEl.className = 'spelling-feedback';
    answerEl.textContent = `答案: ${item.en}`;

    document.getElementById('spellingSubmit').style.display = 'none';
    document.getElementById('spellingSkip').style.display = 'none';

    setTimeout(() => {
        spellingIndex++;
        showSpellingCard();
    }, 1500);
}

function showSpellingFinished() {
    const accuracy = spellingStats.total > 0
        ? Math.round((spellingStats.correct / spellingStats.total) * 100)
        : 0;

    document.getElementById('spellingHint').textContent = '拼写测试完成！';
    document.getElementById('spellingInput').style.display = 'none';
    document.getElementById('spellingFeedback').textContent = `正确率: ${accuracy}%`;
    document.getElementById('spellingFeedback').className = 'spelling-feedback correct';
    document.getElementById('spellingAnswer').textContent = `${spellingStats.correct} / ${spellingStats.total} 正确`;

    document.getElementById('spellingSubmit').style.display = 'none';
    document.getElementById('spellingSkip').style.display = 'none';

    saveProgress();
}

// 拼写输入框回车事件
document.getElementById('spellingInput').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
        e.preventDefault();
        if (document.getElementById('spellingSubmit').style.display !== 'none') {
            checkSpelling();
        } else {
            spellingIndex++;
            showSpellingCard();
        }
    }
});

async function loadEbbinghausSchedule() {
    const now = Date.now();
    const schedule = await API.getEbbinghaus();
    const words = allLessons[currentChapter] || [];

    let pending = [];
    let completed = [];

    words.forEach(word => {
        const key = word.en;
        const record = schedule[key];

        if (!record) {
            // 新词，需要添加到复习计划
            pending.push({
                ...word,
                nextReview: now,
                stage: 0,
                isNew: true
            });
        } else if (record.nextReview <= now) {
            // 需要复习
            pending.push({
                ...word,
                nextReview: record.nextReview,
                stage: record.stage
            });
        } else {
            // 已完成本轮复习
            completed.push({
                ...word,
                nextReview: record.nextReview,
                stage: record.stage
            });
        }
    });

    // 按复习时间排序
    pending.sort((a, b) => a.nextReview - b.nextReview);

    // 更新统计
    document.getElementById('ebbinghausPending').textContent = pending.length;
    document.getElementById('ebbinghausCompleted').textContent = completed.length;

    // 渲染列表
    renderEbbinghausList(pending, completed);
}

function renderEbbinghausList(pending, completed) {
    const listEl = document.getElementById('ebbinghausList');
    const now = Date.now();

    if (pending.length === 0 && completed.length === 0) {
        listEl.innerHTML = '<div class="ebbinghaus-empty">本章暂无复习计划</div>';
        return;
    }

    let html = '';

    // 待复习的词
    pending.forEach(word => {
        const timeDiff = now - word.nextReview;
        let timeClass = '';
        let timeText = '';

        if (timeDiff > 0) {
            // 已超时
            if (timeDiff > 60 * 60 * 1000) {
                timeClass = 'urgent';
                timeText = `超时 ${Math.floor(timeDiff / (60 * 60 * 1000))}小时`;
            } else {
                timeClass = 'urgent';
                timeText = `超时 ${Math.floor(timeDiff / (60 * 1000))}分钟`;
            }
        } else {
            // 未到时间
            const absDiff = Math.abs(timeDiff);
            if (absDiff > 24 * 60 * 60 * 1000) {
                timeText = `${Math.floor(absDiff / (24 * 60 * 60 * 1000))}天后`;
            } else if (absDiff > 60 * 60 * 1000) {
                timeClass = 'soon';
                timeText = `${Math.floor(absDiff / (60 * 60 * 1000))}小时后`;
            } else {
                timeClass = 'soon';
                timeText = `${Math.floor(absDiff / (60 * 1000))}分钟后`;
            }
        }

        html += `
            <div class="ebbinghaus-item">
                <div>
                    <span class="ebbinghaus-word">${word.en}</span>
                    <span class="ebbinghaus-meaning">${word.zh}</span>
                </div>
                <span class="ebbinghaus-time ${timeClass}">${timeText}</span>
            </div>
        `;
    });

    // 已完成的词
    completed.forEach(word => {
        const nextReviewDate = new Date(word.nextReview);
        const timeText = `${nextReviewDate.getMonth() + 1}/${nextReviewDate.getDate()} 复习`;

        html += `
            <div class="ebbinghaus-item" style="opacity: 0.6;">
                <div>
                    <span class="ebbinghaus-word">${word.en}</span>
                    <span class="ebbinghaus-meaning">${word.zh}</span>
                </div>
                <span class="ebbinghaus-time">${timeText}</span>
            </div>
        `;
    });

    listEl.innerHTML = html;
}

async function startEbbinghausReview() {

let currentLogDate = getTodayStr();
let dailyLogData = {}; // { '2026-06-04': { entries: [{text, status}], autoIncomplete: true } }

function getTodayStr() {
    const d = new Date();
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function formatDateDisplay(dateStr) {
    const d = new Date(dateStr + 'T00:00:00');
    const today = getTodayStr();
    const yesterday = new Date();
    yesterday.setDate(yesterday.getDate() - 1);
    const yesterdayStr = `${yesterday.getFullYear()}-${String(yesterday.getMonth()+1).padStart(2,'0')}-${String(yesterday.getDate()).padStart(2,'0')}`;

    if (dateStr === today) return '今天';
    if (dateStr === yesterdayStr) return '昨天';

    const weekdays = ['日', '一', '二', '三', '四', '五', '六'];
    return `${d.getMonth()+1}月${d.getDate()}日 周${weekdays[d.getDay()]}`;
}

// 切换日志面板展开/收起
function toggleDailyLog() {

// 切换日期
function changeLogDate(delta) {
    const d = new Date(currentLogDate + 'T00:00:00');
    d.setDate(d.getDate() + delta);
    currentLogDate = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    renderDailyLog();
}

// 获取当前日期的日志
function getLogForDate(dateStr) {
    if (!dailyLogData[dateStr]) {
        dailyLogData[dateStr] = { entries: [], autoIncomplete: false };
    }
    return dailyLogData[dateStr];
}

// 渲染日志
function renderDailyLog() {
    document.getElementById('logDateDisplay').textContent = formatDateDisplay(currentLogDate);

    const log = getLogForDate(currentLogDate);
    const container = document.getElementById('logEntries');
    container.innerHTML = '';

    if (log.entries.length === 0) {
        container.innerHTML = '<div style="text-align:center;color:#9a9590;padding:20px;">暂无学习计划</div>';
    } else {
        log.entries.forEach((entry, index) => {
            const div = document.createElement('div');
            div.className = 'log-entry';

            const checkbox = document.createElement('div');
            checkbox.className = 'log-entry-checkbox' + (entry.status === 'done' ? ' checked' : entry.status === 'exceeded' ? ' exceeded' : entry.status === 'incomplete' ? ' incomplete' : '');
            checkbox.innerHTML = entry.status === 'done' ? '&#10003;' : entry.status === 'exceeded' ? '&#9733;' : entry.status === 'incomplete' ? '&#10007;' : '';
            checkbox.onclick = () => cycleLogStatus(index);

            const text = document.createElement('span');
            text.className = 'log-entry-text';
            text.textContent = entry.text;

            const status = document.createElement('span');
            status.className = 'log-entry-status ' + (entry.status === 'done' ? 'done' : entry.status === 'exceeded' ? 'exceeded' : entry.status === 'incomplete' ? 'missed' : 'pending');
            status.textContent = entry.status === 'done' ? '已完成' : entry.status === 'exceeded' ? '超标' : entry.status === 'incomplete' ? '未完成' : '待完成';

            const delBtn = document.createElement('span');
            delBtn.style.cssText = 'cursor:pointer;color:#9a9590;font-size:0.85rem;padding:4px;';
            delBtn.textContent = '✕';
            delBtn.onclick = (e) => { e.stopPropagation(); removeLogEntry(index); };

            div.appendChild(checkbox);
            div.appendChild(text);
            div.appendChild(status);
            div.appendChild(delBtn);
            container.appendChild(div);
        });
    }

    // 更新统计
    const done = log.entries.filter(e => e.status === 'done').length;
    const exceeded = log.entries.filter(e => e.status === 'exceeded').length;
    const incomplete = log.entries.filter(e => e.status === 'incomplete').length;
    const total = log.entries.length;

    const summary = document.getElementById('logSummary');
    if (total > 0) {
        summary.innerHTML = `<div class="log-summary-text">共 <strong>${total}</strong> 项计划：完成 <strong>${done}</strong> · 超标 <strong>${exceeded}</strong> · 未完成 <strong>${incomplete}</strong> · 待完成 <strong>${total - done - exceeded - incomplete}</strong></div>`;
    } else {
        summary.innerHTML = '';
    }

    // 更新今日状态标签
    updateTodayStatus();
}

// 循环切换状态：待完成 -> 已完成 -> 超标 -> 未完成 -> 待完成
function cycleLogStatus(index) {
    const log = getLogForDate(currentLogDate);
    const entry = log.entries[index];
    const states = ['pending', 'done', 'exceeded', 'incomplete'];
    const currentIdx = states.indexOf(entry.status);
    entry.status = states[(currentIdx + 1) % states.length];
    saveDailyLog();
    renderDailyLog();
}

// 添加日志条目
function addLogEntry() {
    const text = prompt('输入学习计划内容：');
    if (!text || !text.trim()) return;

    const log = getLogForDate(currentLogDate);
    log.entries.push({ text: text.trim(), status: 'pending' });
    saveDailyLog();
    renderDailyLog();
}

// 删除日志条目
function removeLogEntry(index) {
    const log = getLogForDate(currentLogDate);
    log.entries.splice(index, 1);
    saveDailyLog();
    renderDailyLog();
}

// 更新今日状态标签
function updateTodayStatus() {
    const today = getTodayStr();
    const todayLog = getLogForDate(today);
    const statusEl = document.getElementById('logTodayStatus');

    if (todayLog.entries.length === 0) {
        statusEl.textContent = '';
        return;
    }

    const done = todayLog.entries.filter(e => e.status === 'done' || e.status === 'exceeded').length;
    const total = todayLog.entries.length;

    if (done >= total) {
        statusEl.textContent = '✅ 今日计划已完成';
        statusEl.style.color = '#5a7a5a';
    } else {
        statusEl.textContent = `(${done}/${total} 已完成)`;
        statusEl.style.color = '#8a8578';
    }
}

// 启动时检查未完成任务
async function checkIncompleteTasks() {
    const today = getTodayStr();
    const yesterday = new Date();
    yesterday.setDate(yesterday.getDate() - 1);
    const yesterdayStr = `${yesterday.getFullYear()}-${String(yesterday.getMonth()+1).padStart(2,'0')}-${String(yesterday.getDate()).padStart(2,'0')}`;

    // 检查昨天未标记的任务，自动标记为未完成
    const yesterdayLog = getLogForDate(yesterdayStr);
    let changed = false;
    yesterdayLog.entries.forEach(entry => {
        if (entry.status === 'pending') {
            entry.status = 'incomplete';
            changed = true;
        }
    });
    if (changed) {
        yesterdayLog.autoIncomplete = true;
        await saveDailyLog();
    }

    // 检查今天是否有未完成的计划
    const todayLog = getLogForDate(today);
    const incompleteYesterday = yesterdayLog.entries.filter(e => e.status === 'incomplete').length;
    const pendingToday = todayLog.entries.filter(e => e.status === 'pending').length;

    // 显示提醒
    if (incompleteYesterday > 0 || (todayLog.entries.length > 0 && pendingToday > 0)) {
        let icon, title, message;

        if (incompleteYesterday > 0 && todayLog.entries.length > 0) {
            icon = '&#9888;&#65039;';
            title = '有未完成的学习任务';
            message = `昨天有 <strong>${incompleteYesterday}</strong> 项计划未完成。今天还有 <strong>${pendingToday}</strong> 项待完成的计划，建议尽早开始学习。`;
        } else if (incompleteYesterday > 0) {
            icon = '&#128221;';
            title = '昨天的计划未完成';
            message = `昨天有 <strong>${incompleteYesterday}</strong> 项计划未完成。建议制定今天的计划并坚持执行。`;
        } else {
            icon = '&#128218;';
            title = '今日学习计划';
            message = `今天有 <strong>${pendingToday}</strong> 项待完成的计划，加油！`;
        }

        document.getElementById('reminderIcon').innerHTML = icon;
        document.getElementById('reminderTitle').textContent = title;
        document.getElementById('reminderMessage').innerHTML = message;
        document.getElementById('reminderOverlay').classList.add('show');
    }

    renderDailyLog();
}

function closeReminder() {
    document.getElementById('reminderOverlay').classList.remove('show');
}

// 初始化日志系统
window.addEventListener('DOMContentLoaded', async () => {
    await loadDailyLog();
    await checkIncompleteTasks();
});
// 注册 Service Worker (PWA 离线支持)
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js');
}
</script>
